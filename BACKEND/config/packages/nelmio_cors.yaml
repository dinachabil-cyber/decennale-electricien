nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['^https?://localhost:[0-9]+', '^http://localhost:3000', '^https://ecennale-electricien-backend.ddev.site', '^http://ecennale-electricien-backend.ddev.site']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/api/': null